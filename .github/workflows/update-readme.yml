name: Update Profile README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Update dates
        run: |
          sed -i "s/Last rendered: .*/Last rendered: $(date -u +%Y-%m-%d)/" README.md
          sed -i "s/Last updated: .*/Last updated: $(date -u +%B %d, %Y)/" README.md
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update dates"
          git push
