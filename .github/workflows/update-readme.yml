name: Update Profile README

on:
  schedule:
    - cron: '0 0 * * *'        # Runs daily at midnight UTC
  workflow_dispatch:           # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Required to push changes
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Update dates in README
        run: |
          # Update "Last rendered" date (ISO format)
          sed -i "s/Last rendered: .*/Last rendered: $(date -u +%Y-%m-%d)/" README.md
          
          # Update "Last updated" date (readable format)
          sed -i "s/Last updated: .*/Last updated: $(date -u +%B %d, %Y)/" README.md
      
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update profile dates"
          git push
